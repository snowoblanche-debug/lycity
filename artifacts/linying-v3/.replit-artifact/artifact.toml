kind = "web"
previewPath = "/v3/"
title = "LY.city V3"
version = "1.0.0"
id = "artifacts/linying-v3"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/v3/" ]
localPort = 8080

[services.development]
run = "pnpm --filter @workspace/linying-v3 run build:watch"

[services.production]
build = [ "pnpm", "--filter", "@workspace/linying-v3", "run", "build" ]
publicDir = "artifacts/linying-v3/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8080"
BASE_PATH = "/v3/"
