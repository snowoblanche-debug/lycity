openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 聆櫻聖境點歌系統 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: songs
    description: Song database operations
  - name: queue
    description: Song queue operations
  - name: categories
    description: Category management
  - name: settings
    description: Admin settings
  - name: admin
    description: Admin-only operations
  - name: sessions
    description: Song session (歌回) management
  - name: lyrics
    description: Lyrics management
  - name: obs
    description: OBS overlay endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /songs:
    get:
      operationId: listSongs
      tags: [songs]
      summary: List all songs with optional filters
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: primaryTag
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of songs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongList"
    post:
      operationId: createSong
      tags: [songs]
      summary: Create a new song
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongInput"
      responses:
        "201":
          description: Song created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"

  /songs/{id}:
    get:
      operationId: getSong
      tags: [songs]
      summary: Get a song by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Song detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
    patch:
      operationId: updateSong
      tags: [songs]
      summary: Update a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongUpdate"
      responses:
        "200":
          description: Song updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
    delete:
      operationId: deleteSong
      tags: [songs]
      summary: Delete a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Song deleted

  /songs/analyze-url:
    post:
      operationId: analyzeUrl
      tags: [songs]
      summary: Analyze a YouTube URL and suggest song metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YouTubeUrlInput"
      responses:
        "200":
          description: Analyzed YouTube metadata with song suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YouTubeAnalysis"

  /songs/import/google-sheet/preview:
    post:
      operationId: previewGoogleSheetSync
      tags: [songs]
      summary: Preview what a Google Sheet sync would do
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleSheetImport"
      responses:
        "200":
          description: Sync preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncPreview"

  /songs/import/google-sheet:
    post:
      operationId: importFromGoogleSheet
      tags: [songs]
      summary: Import songs from Google Sheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleSheetImport"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /songs/{id}/lyrics:
    get:
      operationId: getSongLyrics
      tags: [lyrics]
      summary: Get lyrics for a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Song lyrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongLyrics"
    patch:
      operationId: updateSongLyrics
      tags: [lyrics]
      summary: Save or update lyrics for a song (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongLyricsInput"
      responses:
        "200":
          description: Lyrics updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongLyrics"
    delete:
      operationId: deleteSongLyrics
      tags: [lyrics]
      summary: Remove lyrics from a song (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Lyrics removed

  /songs/{id}/lyrics/search:
    post:
      operationId: searchSongLyrics
      tags: [lyrics]
      summary: Search external lyrics providers for a song (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LyricsSearchInput"
      responses:
        "200":
          description: Lyrics search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LyricsSearchResult"

  /songs/{id}/cooldown:
    get:
      operationId: getSongCooldown
      tags: [songs]
      summary: Get cooldown status for a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cooldown status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CooldownStatus"

  /queue:
    get:
      operationId: listQueue
      tags: [queue]
      summary: Get current queue
      responses:
        "200":
          description: Queue list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueList"
    post:
      operationId: addToQueue
      tags: [queue]
      summary: Add a song to the queue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueItemInput"
      responses:
        "201":
          description: Added to queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueItem"

  /queue/{id}:
    delete:
      operationId: removeFromQueue
      tags: [queue]
      summary: Remove an item from the queue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed from queue

  /queue/{id}/skip:
    patch:
      operationId: skipQueueItem
      tags: [queue]
      summary: Skip a queue item (no history, no play count)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Queue item skipped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueItem"

  /queue/{id}/complete:
    patch:
      operationId: completeQueueItem
      tags: [queue]
      summary: Mark a queue item as completed (writes history)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Queue item completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueItem"

  /queue/reorder:
    patch:
      operationId: reorderQueue
      tags: [queue]
      summary: Reorder the queue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueReorder"
      responses:
        "200":
          description: Queue reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueList"

  /queue/current:
    get:
      operationId: getCurrentPlaying
      tags: [queue]
      summary: Get currently playing and next song for OBS
      responses:
        "200":
          description: Current playing info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentPlaying"

  /queue/{id}/play:
    patch:
      operationId: setQueueItemPlaying
      tags: [queue]
      summary: Mark a queue item as now playing (V2 compat)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Queue item set to playing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueItem"

  /queue/{id}/start:
    patch:
      operationId: startQueueItem
      tags: [queue]
      summary: "V3: Explicitly start singing — sets started_at timestamp for lyrics sync"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Queue item started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueItem"

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: List song performance history
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: sessionId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: History list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongHistoryList"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryList"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Category deleted

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all song sessions
      responses:
        "200":
          description: Sessions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionList"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create and start a new song session (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/active:
    get:
      operationId: getActiveSession
      tags: [sessions]
      summary: Get the currently active session
      responses:
        "200":
          description: Active session or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSessionResponse"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session with its setlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session with setlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Session deleted

  /sessions/{id}/end:
    patch:
      operationId: endSession
      tags: [sessions]
      summary: End a song session (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}/export:
    get:
      operationId: exportSession
      tags: [sessions]
      summary: Export session setlist as plain text (for Discord posting)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plain text setlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionExport"

  /obs/verify:
    get:
      operationId: verifyObsKey
      tags: [settings]
      summary: Verify OBS access key
      parameters:
        - name: key
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Key verification result
          content:
            application/json:
              schema:
                type: object
                required: [valid]
                properties:
                  valid:
                    type: boolean

  /obs/lyrics/current:
    get:
      operationId: getObsLyricsCurrent
      tags: [obs]
      summary: Get current song + lyrics for OBS lyrics overlay (polls every 2s)
      responses:
        "200":
          description: Current lyrics state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObsLyricsState"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /stats:
    get:
      operationId: getStats
      tags: [songs]
      summary: Get song statistics overview
      responses:
        "200":
          description: Stats overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /admin/requesters:
    get:
      operationId: listRequesters
      tags: [admin]
      summary: List requester stats sorted by request count
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Requester stats list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequesterStatList"

  /admin/stats/rebuild:
    post:
      operationId: rebuildStats
      tags: [admin]
      summary: Rebuild all statistics from song_history (admin only)
      responses:
        "200":
          description: Rebuild result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebuildStatsResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Song:
      type: object
      required: [id, title, artist, language, playCount, categories, youtubeUrl, isPracticing, hasPitchWarning, createdAt, cooldownDays, cooldownMode]
      properties:
        id:
          type: integer
        title:
          type: string
        artist:
          type: string
        language:
          type: string
        playCount:
          type: integer
        primaryTag:
          type: ["string", "null"]
        categories:
          type: array
          items:
            type: string
        youtubeUrl:
          type: ["string", "null"]
        isPracticing:
          type: boolean
        hasPitchWarning:
          type: boolean
        status:
          type: string
        createdAt:
          type: string
        lyricsText:
          type: ["string", "null"]
        lyricsFormat:
          type: ["string", "null"]
        lyricsSource:
          type: ["string", "null"]
        lyricsUpdatedAt:
          type: ["string", "null"]
        cooldownDays:
          type: integer
        cooldownMode:
          type: string
          enum: [warn, block]

    SongInput:
      type: object
      required: [title, artist, language]
      properties:
        title:
          type: string
        artist:
          type: string
        language:
          type: string
        status:
          type: string
        primaryTag:
          type: ["string", "null"]
        categories:
          type: array
          items:
            type: string
        youtubeUrl:
          type: ["string", "null"]
        isPracticing:
          type: boolean
        hasPitchWarning:
          type: boolean
        cooldownDays:
          type: integer
        cooldownMode:
          type: string

    SongUpdate:
      type: object
      properties:
        title:
          type: string
        artist:
          type: string
        language:
          type: string
        status:
          type: string
        primaryTag:
          type: ["string", "null"]
        categories:
          type: array
          items:
            type: string
        youtubeUrl:
          type: ["string", "null"]
        isPracticing:
          type: boolean
        hasPitchWarning:
          type: boolean
        cooldownDays:
          type: integer
        cooldownMode:
          type: string

    SongList:
      type: object
      required: [songs, total, page, limit]
      properties:
        songs:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    SongLyrics:
      type: object
      required: [songId]
      properties:
        songId:
          type: integer
        lyricsText:
          type: ["string", "null"]
        lyricsFormat:
          type: ["string", "null"]
        lyricsSource:
          type: ["string", "null"]
        lyricsUpdatedAt:
          type: ["string", "null"]

    SongLyricsInput:
      type: object
      required: [lyricsText, lyricsFormat, lyricsSource]
      properties:
        lyricsText:
          type: string
        lyricsFormat:
          type: string
          enum: [lrc, krc, yrc, plain]
        lyricsSource:
          type: string
          enum: [lrclib, netease, manual]

    LyricsSearchInput:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
          enum: [lrclib, netease, auto]
        title:
          type: ["string", "null"]
        artist:
          type: ["string", "null"]

    LyricsSearchResultItem:
      type: object
      required: [provider, lyricsText, lyricsFormat, previewLines]
      properties:
        provider:
          type: string
        lyricsText:
          type: string
        lyricsFormat:
          type: string
        duration:
          type: ["integer", "null"]
        previewLines:
          type: array
          items:
            type: string

    LyricsSearchResult:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/LyricsSearchResultItem"

    CooldownStatus:
      type: object
      required: [cooldownDays, cooldownMode, isInCooldown]
      properties:
        cooldownDays:
          type: integer
        cooldownMode:
          type: string
          enum: [warn, block]
        lastPerformed:
          type: ["string", "null"]
        remainingDays:
          type: integer
        isInCooldown:
          type: boolean

    QueueItem:
      type: object
      required: [id, songId, requesterName, position, status, createdAt]
      properties:
        id:
          type: integer
        songId:
          type: integer
        song:
          $ref: "#/components/schemas/Song"
        requesterName:
          type: string
        note:
          type: ["string", "null"]
        position:
          type: integer
        status:
          type: string
          enum: [waiting, playing, completed, skipped]
        createdAt:
          type: string
        startedAt:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
        sessionId:
          type: ["integer", "null"]

    QueueItemInput:
      type: object
      required: [songId, requesterName]
      properties:
        songId:
          type: integer
        requesterName:
          type: string
        note:
          type: ["string", "null"]
          maxLength: 100

    QueueList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QueueItem"
        total:
          type: integer

    QueueReorder:
      type: object
      required: [orderedIds]
      properties:
        orderedIds:
          type: array
          items:
            type: integer

    CurrentPlaying:
      type: object
      properties:
        current:
          $ref: "#/components/schemas/QueueItem"
        next:
          $ref: "#/components/schemas/QueueItem"

    ObsLyricsState:
      type: object
      required: [hasCurrentSong]
      properties:
        hasCurrentSong:
          type: boolean
        song:
          type: object
          properties:
            title:
              type: string
            artist:
              type: string
        startedAt:
          type: ["string", "null"]
        lyricsText:
          type: ["string", "null"]
        lyricsFormat:
          type: ["string", "null"]
        requester:
          type: ["string", "null"]
        requestNote:
          type: ["string", "null"]

    Session:
      type: object
      required: [id, title, isActive, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        isActive:
          type: boolean
        startedAt:
          type: ["string", "null"]
        endedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    SessionInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]

    SessionList:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/Session"

    ActiveSessionResponse:
      type: object
      required: [session]
      properties:
        session:
          oneOf:
            - $ref: "#/components/schemas/Session"
            - type: "null"

    SessionDetail:
      type: object
      required: [session, setlist, songCount]
      properties:
        session:
          $ref: "#/components/schemas/Session"
        setlist:
          type: array
          items:
            $ref: "#/components/schemas/SongHistory"
        songCount:
          type: integer

    SessionExport:
      type: object
      required: [title, text, songCount]
      properties:
        title:
          type: string
        text:
          type: string
        songCount:
          type: integer

    Category:
      type: object
      required: [id, name, type, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
